services:
  - type: web
    name: debtflow-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=src uvicorn debtflow.api.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: HOURLY_RATE
        value: "150"
      - key: FRONTEND_URL
        value: "https://debtflow-delta.vercel.app"
    autoDeploy: true
